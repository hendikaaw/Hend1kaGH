name: Metrics Professional Layout
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. METRIKS UTAMA & PENCAPAIAN (Hanya menampilkan Header & Badges)
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-main.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Hendikaaw
          template: classic
          base: header, metadata
          config_theme: tokyonight
          config_timezone: Asia/Jakarta
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes

      # 2. KALENDER 3D (Dipisah agar bisa ditaruh di tengah/bawah dengan rapi)
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Hendikaaw
          template: classic
          base: ""
          config_theme: tokyonight
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # 3. STATISTIK BAHASA PEMROGRAMAN (Grafik Donat / Bar yang Clean)
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Hendikaaw
          template: classic
          base: ""
          config_theme: tokyonight
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, shell
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_categories: programming
