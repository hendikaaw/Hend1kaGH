name: Metrics Aesthetic
on:
  # Berjalan otomatis setiap tengah malam
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # TOKEN
          token: ${{ secrets.METRICS_TOKEN }}
          user: Hend1kaGH # PENTING: Ganti dengan username GitHub Anda

          # ==========================================
          # PENGATURAN DASAR & TEMA
          # ==========================================
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta
          config_theme: dark # Pilihan tema aesthetic: dark, tokyonight, dracula, atau transparent
          config_animations: yes # Menambahkan animasi halus saat halaman dimuat
          
          # ==========================================
          # PLUGIN 1: KALENDER KONTRIBUSI 3D (ISOMETRIC)
          # ==========================================
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Ditampilkan setengah tahun agar tidak terlalu panjang/penuh

          # ==========================================
          # PLUGIN 2: STATISTIK BAHASA PEMROGRAMAN
          # ==========================================
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, shell # Mengabaikan bahasa pelengkap agar lebih fokus ke bahasa utama
          plugin_languages_details: percentage, lines
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes # Menghitung secara akurat dari semua repositori Anda

          # ==========================================
          # PLUGIN 3: KEBIASAAN NGODING (CODING HABITS)
          # ==========================================
          plugin_habits: yes
          plugin_habits_from: 200       # Mengambil 200 event terakhir
          plugin_habits_days: 14        # Data 14 hari terakhir
          plugin_habits_facts: yes      # Menampilkan fakta unik (misal: "Sering ngoding di pagi hari")
          plugin_habits_charts: yes     # Menampilkan diagram garis yang elegan

          # ==========================================
          # PLUGIN 4: PENCAPAIAN (ACHIEVEMENTS)
          # ==========================================
          plugin_achievements: yes
          plugin_achievements_display: compact # "compact" membuat ikon lebih rapi dan tidak memakan tempat
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C # Hanya menampilkan pencapaian tier C ke atas
